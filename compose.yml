services:
  api:
    build: .
    container_name: cannula-api
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    env_file: .env
    ports:
      - "127.0.0.1:${PORT:-3001}:${PORT:-3001}"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:8
    container_name: ur-menu-mongo
    restart: unless-stopped
    mem_limit: 1500m
    command:
      - mongod
      - --bind_ip_all
      - --wiredTigerCacheSizeGB
      - "0.75"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' localhost:27017/admin | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ur-menu-redis
    restart: unless-stopped
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:
  redis_data:
